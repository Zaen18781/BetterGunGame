config-version: 2

lobby-location: null

game:
  round-duration-seconds: 1200
  max-levels: 50
  respawn-protection-seconds: 5
  min-players: 2
  max-players-per-map: 16
  countdown-seconds: 5

sounds:
  enabled: true
  level-up: "entity.player.levelup"
  kill: "entity.experience_orb.pickup"
  respawn: "block.note_block.pling"
  countdown-tick: "block.note_block.pling"
  countdown-go: "entity.ender_dragon.growl"
  game-end: "ui.toast.challenge_complete"
  event-start: "block.note_block.chime"

random-events:
  enabled: false
  interval-seconds: 60
  duration-seconds: 15

messages:
  prefix: "<color:#08a8f8><b>КҷбҙҮбҙӣбҙӣбҙҮКҖЙўбҙңЙҙЙўбҙҖбҙҚбҙҮ</b></color> <dark_gray>В»</dark_gray> "

  # --- Error Messages ---
  no-permission:        "<color:#ff0000><b>вқҢ</b></color> <white>бҙӢбҙҮЙӘЙҙбҙҮ КҷбҙҮКҖбҙҮбҙ„КңбҙӣЙӘЙўбҙңЙҙЙў!</white>"
  player-only:          "<color:#ff0000><b>вқҢ</b></color> <white>ЙҙбҙңКҖ Т“ГјКҖ sбҙҳЙӘбҙҮКҹбҙҮКҖ!</white>"
  game-already-running: "<color:#ff0000><b>вқҢ</b></color> <white>бҙҮЙӘЙҙ sбҙҳЙӘбҙҮКҹ КҹГӨбҙңТ“бҙӣ КҷбҙҮКҖбҙҮЙӘбҙӣs!</white>"
  game-not-running:     "<color:#ff0000><b>вқҢ</b></color> <white>бҙӢбҙҮЙӘЙҙ sбҙҳЙӘбҙҮКҹ КҹГӨбҙңТ“бҙӣ ЙўбҙҮКҖбҙҖбҙ…бҙҮ!</white>"
  not-enough-players:   "<color:#ff0000><b>вқҢ</b></color> <white>ЙҙЙӘбҙ„Кңбҙӣ ЙўбҙҮЙҙбҙңЙў sбҙҳЙӘбҙҮКҹбҙҮКҖ! (бҙҚЙӘЙҙ: <min>)</white>"
  no-maps:              "<color:#ff0000><b>вқҢ</b></color> <white>бҙӢбҙҮЙӘЙҙбҙҮ бҙҚбҙҖбҙҳs ЙўбҙҮТ“бҙңЙҙбҙ…бҙҮЙҙ!</white>"

  # --- Success Messages ---
  lobby-set:     "<color:#00EE39>вң”</color> <white>КҹбҙҸКҷКҷКҸ-sбҙҳбҙҖбҙЎЙҙ ЙўбҙҮsбҙҮбҙӣбҙўбҙӣ.</white>"
  game-started:  "<color:#00EE39>вң”</color> <white>sбҙҳЙӘбҙҮКҹ ЙўбҙҮsбҙӣбҙҖКҖбҙӣбҙҮбҙӣ!</white>"
  game-stopped:  "<color:#ff0000><b>вқҢ</b></color> <white>sбҙҳЙӘбҙҮКҹ ЙўбҙҮsбҙӣбҙҸбҙҳбҙҳбҙӣ.</white>"
  joined-game:   "<color:#00EE39>вң”</color> <white>sбҙҳЙӘбҙҮКҹбҙҮКҖ <color:#08a8f8><name></color> КңЙӘЙҙбҙўбҙңЙўбҙҮТ“ГјЙўбҙӣ.</white>"
  player-added:  "<color:#00EE39>вң”</color> <white><gray>бҙ…бҙң бҙЎбҙңКҖбҙ…бҙҮsбҙӣ бҙўбҙңбҙҚ sбҙҳЙӘбҙҮКҹ КңЙӘЙҙбҙўбҙңЙўбҙҮТ“ГјЙўбҙӣ.</gray></white>"
  reload:        "<color:#00EE39>вң”</color> <white>бҙӢбҙҸЙҙТ“ЙӘЙў ЙҙбҙҮбҙң ЙўбҙҮКҹбҙҖбҙ…бҙҮЙҙ.</white>"

  # --- Game Messages ---
  level-up:                "<color:#2ecc71><b>в¬Ҷ КҹбҙҮбҙ бҙҮКҹ бҙңбҙҳ вҶ’ <level>/<max></b></color>"
  kill-message:            "<gray>бҙ…бҙң КңбҙҖsбҙӣ <color:#08a8f8><victim></color> бҙҮКҹЙӘбҙҚЙӘЙҙЙӘбҙҮКҖбҙӣ.</gray>"
  death-message:           "<gray>бҙ…бҙң бҙЎбҙңКҖбҙ…бҙҮsбҙӣ бҙ бҙҸЙҙ <color:#08a8f8><killer></color> бҙҮКҹЙӘбҙҚЙӘЙҙЙӘбҙҮКҖбҙӣ.</gray>"
  respawn-protected:       "<color:#08a8f8>в—Ҹ КҖбҙҮsбҙҳбҙҖбҙЎЙҙ-sбҙ„Кңбҙңбҙӣбҙў бҙҖбҙӢбҙӣЙӘбҙ  (<seconds>s)</color>"
  respawn-protection-end:  "<gray>в—Ҹ sбҙ„Кңбҙңбҙӣбҙў КҷбҙҮбҙҮЙҙбҙ…бҙҮбҙӣ.</gray>"
  countdown:               "<yellow><b><seconds></b></yellow>"
  countdown-go:            "<color:#00EE39><b>ЙўбҙҸ!</b></color>"
  winner:                  "<gradient:#ffff00:#ff8800><b>рҹҸҶ <name> ЙўбҙҮбҙЎЙӘЙҙЙҙбҙӣ!</b></gradient>"
  tie:                     "<yellow><b>рҹҸҶ бҙңЙҙбҙҮЙҙбҙӣsбҙ„КңЙӘбҙҮбҙ…бҙҮЙҙ!</b></yellow>"
  time-up:                 "<color:#ff0000><b>вҢӣ бҙўбҙҮЙӘбҙӣ бҙҖКҷЙўбҙҮКҹбҙҖбҙңТ“бҙҮЙҙ!</b></color>"

  # --- Event Messages ---
  event-announce: "<gradient:#ff8800:#ffff00><b>вҡЎ бҙҮбҙ бҙҮЙҙбҙӣ: <event></b></gradient>"
  event-end:      "<gray>в—Ҹ бҙҮбҙ бҙҮЙҙбҙӣ КҷбҙҮбҙҮЙҙбҙ…бҙҮбҙӣ.</gray>"
  void-kill:      "<gray>бҙҖssЙӘsбҙӣ: <color:#08a8f8><killer></color> вҶ’ КҹбҙҮбҙ бҙҮКҹ бҙңбҙҳ бҙ…бҙңКҖбҙ„Кң бҙ бҙҸЙӘбҙ…-бҙӢЙӘКҹКҹ.</gray>"
